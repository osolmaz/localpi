name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run coverage
      - run: npm run dry
      - run: npm run mutate
      - uses: dutifuldev/slophammer@main
        with:
          checker: ts
          version: 0.4.0
