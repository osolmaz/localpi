name: publish

on:
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    name: npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm install -g npm@latest
      - run: npm ci

      - name: Validate release metadata
        run: |
          node - <<'NODE'
          const { readFileSync } = require("node:fs");

          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          const errors = [];

          if (pkg.name !== "localpi") {
            errors.push(`package.json name must be localpi; found ${pkg.name ?? "<missing>"}`);
          }

          if (pkg.private === true) {
            errors.push("package.json must not be private for npm publishing.");
          }

          if (pkg.publishConfig?.access !== "public") {
            errors.push("package.json publishConfig.access must be public.");
          }

          if (pkg.bin?.localpi !== "dist/src/cli/main.js") {
            errors.push(
              `package.json bin.localpi must be dist/src/cli/main.js; found ${pkg.bin?.localpi ?? "<missing>"}`
            );
          }

          if (errors.length > 0) {
            for (const error of errors) {
              console.error(error);
            }
            process.exit(1);
          }

          console.log("Release metadata validated.");
          NODE

      - name: Ensure version is not already published
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          published_version="$(npm view "localpi@$package_version" version 2>/dev/null || true)"

          if [ "$published_version" = "$package_version" ]; then
            echo "localpi@$package_version is already published on npm."
            exit 1
          fi

          echo "Publishing localpi@$package_version"

      - run: npm run build
      - run: npm pack --dry-run
      - run: npm publish --access public --provenance
