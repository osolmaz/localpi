typescript:
  coverage_threshold: 85
  complexity_max: 8
  dry:
    max_findings: 0
    paths:
      - src
    exclude:
      - "**/*.test.ts"
      - "tests/**"
      - "dist/**"
      - "coverage/**"
    copied_blocks:
      enabled: true
      min_tokens: 100
  mutation_targets:
    - src/localpi/options.ts
    - src/pi/config.ts
  dependency_boundaries:
    - from: src/cli
      allow:
        - src/common
        - src/localpi
        - src/llm
        - src/pi
    - from: src/localpi
      allow:
        - src/common
        - src/llm
        - src/localpi
    - from: src/pi
      allow:
        - src/localpi
    - from: src/llm
      allow:
        - src/common
