typescript:
  coverage_threshold: 85
  complexity_max: 8
  dry:
    max_findings: 0
    paths:
      - src
    exclude:
      - "**/*.test.ts"
      - "tests/**"
      - "dist/**"
      - "coverage/**"
    copied_blocks:
      enabled: true
      min_tokens: 100
  mutation_targets:
    - src/localagent/options.ts
    - src/pi/config.ts
  dependency_boundaries:
    - from: src/cli
      allow:
        - src/common
        - src/localagent
        - src/llm
        - src/pi
    - from: src/localagent
      allow:
        - src/common
        - src/llm
    - from: src/pi
      allow:
        - src/localagent
    - from: src/llm
      allow:
        - src/common
